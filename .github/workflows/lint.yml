name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "uv.lock"

      - name: Install uv
        run: python3 -m pip install uv==0.10.6

      - name: Sync dependencies
        run: uv sync --group dev --frozen

      - name: Lint
        run: uv run --group dev ruff check .

      - name: Format
        run: uv run --group dev ruff format . --check
