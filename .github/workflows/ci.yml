name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: "Tests"
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        python-version:
          - "3.14"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v6.2.0
        with:
          python-version: "${{ matrix.python-version }}"
          cache: "pip"
          cache-dependency-path: "uv.lock"

      - name: Install uv
        run: python3 -m pip install uv==0.10.6

      - name: Sync dependencies
        run: uv sync --group dev --frozen

      - name: Run tests
        run: uv run --group dev pytest -v

      - name: Run type checks
        run: uv run --group dev mypy custom_components
