name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version increment"
        required: true
        default: PATCH
        type: choice
        options:
          - PATCH
          - MINOR
          - MAJOR

permissions:
  contents: write

jobs:
  release:
    name: Commitizen release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        with:
          app-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_SECRET_KEY }}

      - name: Checkout the repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "uv.lock"

      - name: Install uv
        run: python3 -m pip install uv==0.10.6

      - name: Sync dependencies
        run: uv sync --group dev --frozen

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create changelog
        run: uv run --group dev cz bump --yes --changelog --increment ${{ inputs.increment }}

      - name: Push commit and tags
        run: git push --follow-tags

      - name: Resolve release tag
        id: release_tag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
        run: gh release create "${{ steps.release_tag.outputs.tag }}" --generate-notes
